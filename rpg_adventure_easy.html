
<style>
  #rpg{font-family:var(--font-mono);padding:1rem 0;color:var(--color-text-primary)}
  #log{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:1rem;height:200px;overflow-y:auto;font-size:13px;line-height:1.8;margin-bottom:.75rem}
  .log-line{margin:0}
  .em{color:#185FA5;font-weight:500}
  .dmg{color:#A32D2D}
  .ok{color:#3B6D11}
  .muted{color:var(--color-text-secondary)}
  .boss-line{color:#854F0B;font-weight:500}
  .ability-line{color:#534AB7;font-weight:500}
  #stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;margin-bottom:.75rem}
  .stat{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:6px 8px;text-align:center}
  .stat-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:2px}
  .stat-value{font-size:15px;font-weight:500}
  .bar{height:5px;border-radius:3px;background:var(--color-border-tertiary);margin-top:3px;overflow:hidden}
  .bar-fill{height:100%;transition:width .4s;border-radius:3px}
  #enemy-block{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 12px;margin-bottom:.75rem;font-size:13px;display:none}
  .boss-block{border-color:#BA7517!important}
  #enemy-name{font-weight:500;margin-bottom:4px}
  #enemy-bar-wrap{height:6px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden}
  #enemy-bar{height:100%;background:#A32D2D;transition:width .4s;border-radius:3px}
  #actions{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  #abilities-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-bottom:7px}
  button{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:9px 12px;font-size:12px;cursor:pointer;color:var(--color-text-primary);font-family:var(--font-mono);text-align:left;transition:background .15s}
  button:hover{background:var(--color-background-secondary)}
  button:disabled{opacity:.35;cursor:default}
  .btn-ability{border-color:#AFA9EC;color:#3C3489}
  .btn-boss{border-color:#EF9F27}
  #location-tag{font-size:11px;color:var(--color-text-secondary);margin-bottom:.6rem;letter-spacing:.05em;text-transform:uppercase}
  .cd-badge{font-size:10px;color:var(--color-text-secondary);margin-left:4px}
  #xp-row{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
  #xp-label{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
  #xp-bar-wrap{flex:1;height:4px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden}
  #xp-bar{height:100%;background:#534AB7;transition:width .4s;border-radius:2px}
  #xp-text{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
</style>

<div id="rpg">
<h2 class="sr-only">RPG adventure game with abilities and bosses</h2>
<div id="location-tag">The Verdant Crossroads</div>
<div id="log"></div>
<div id="stats">
  <div class="stat"><div class="stat-label">HP</div><div class="stat-value" id="s-hp">—</div><div class="bar"><div class="bar-fill" id="hp-bar" style="width:100%;background:#3B6D11"></div></div></div>
  <div class="stat"><div class="stat-label">ATK</div><div class="stat-value" id="s-atk">—</div></div>
  <div class="stat"><div class="stat-label">DEF</div><div class="stat-value" id="s-def">—</div></div>
  <div class="stat"><div class="stat-label">Gold</div><div class="stat-value" id="s-gold">—</div></div>
  <div class="stat"><div class="stat-label">Lvl</div><div class="stat-value" id="s-level">—</div></div>
</div>
<div id="xp-row"><span id="xp-label">XP</span><div id="xp-bar-wrap"><div id="xp-bar" style="width:0%"></div></div><span id="xp-text">0/30</span></div>
<div id="enemy-block">
  <div id="enemy-name">Enemy</div>
  <div id="enemy-bar-wrap"><div id="enemy-bar" style="width:100%"></div></div>
  <div id="enemy-hp-text" style="font-size:11px;color:var(--color-text-secondary);margin-top:3px"></div>
</div>
<div id="abilities-row" style="display:none"></div>
<div id="actions"></div>
</div>

<script>
const S={
  hp:30,maxHp:30,atk:6,def:2,
  gold:10,xp:0,level:1,
  inventory:[],
  location:"crossroads",
  enemy:null,
  phase:"explore",
  abilityCDs:{}
};

const XP_PER_LEVEL=lvl=>lvl*30;

const ABILITIES=[
  {id:"slash",name:"Power Slash",desc:"Heavy strike, 150% ATK",unlockLvl:1,cd:2,mpCost:0,
   use(e){const d=Math.round(S.atk*1.5+rnd(3));e.hp-=d;print("Power Slash hits for "+d+"!","ability-line");return d}},
  {id:"bash",name:"Shield Bash",desc:"Stun + low dmg",unlockLvl:2,cd:3,mpCost:0,
   use(e){const d=Math.round(S.atk*0.6);e.hp-=d;e.stunned=true;print("Shield Bash! "+d+" dmg — enemy stunned!","ability-line");return d}},
  {id:"flurry",name:"Flurry",desc:"3 quick hits",unlockLvl:3,cd:3,mpCost:0,
   use(e){let tot=0;for(let i=0;i<3;i++){const d=Math.max(1,S.atk-2+rnd(3));e.hp-=d;tot+=d;}print("Flurry! 3 hits for "+tot+" total!","ability-line");return tot}},
  {id:"rally",name:"Rally",desc:"Heal 30% max HP",unlockLvl:4,cd:4,mpCost:0,
   use(){const h=Math.round(S.maxHp*0.3);S.hp=Math.min(S.maxHp,S.hp+h);print("You rally! +"+h+" HP","ability-line");return 0}},
  {id:"execute",name:"Execute",desc:"Double dmg if enemy <30% HP",unlockLvl:5,cd:2,mpCost:0,
   use(e){const low=e.hp/e.maxHp<0.3;const d=Math.round(S.atk*(low?2:1)+rnd(4));e.hp-=d;print("Execute "+(low?"— lethal blow! ":"")+d+" dmg!","ability-line");return d}},
  {id:"meteor",name:"Meteor",desc:"Massive hit, long CD",unlockLvl:6,cd:5,mpCost:0,
   use(e){const d=Math.round(S.atk*2.5+rnd(8));e.hp-=d;print("Meteor crashes for "+d+"!!!","ability-line");return d}}
];

const LOCATIONS={
  crossroads:{name:"The Verdant Crossroads",desc:"A mossy stone marker stands where two roads meet.",exits:{forest:"Enter the Dark Forest",cave:"Descend into the Cave",ruins:"Explore the Ancient Ruins",town:"Walk to Millhaven Town"}},
  forest:{name:"Dark Forest",desc:"Gnarled trees block the sky. Danger lurks.",exits:{crossroads:"Back to the Crossroads"}},
  cave:{name:"Dripping Cave",desc:"Cold stone and dripping water. Strange glyphs glow.",exits:{crossroads:"Back to the Crossroads"}},
  ruins:{name:"Ancient Ruins",desc:"Crumbling towers. The air smells of old magic. For veterans only.",exits:{crossroads:"Back to the Crossroads"}},
  town:{name:"Millhaven Town",desc:"Smoke rises from chimneys. A merchant waves.",exits:{crossroads:"Back to the Crossroads"}}
};

const ENEMIES={
  forest:[
    {name:"Goblin Scout",hp:10,maxHp:10,atk:4,minLvl:1,reward:{gold:5,xp:15}},
    {name:"Wolf",hp:14,maxHp:14,atk:6,minLvl:1,reward:{gold:3,xp:20}},
    {name:"Orc Raider",hp:22,maxHp:22,atk:9,minLvl:2,reward:{gold:9,xp:35}},
    {name:"Forest Witch",hp:18,maxHp:18,atk:12,minLvl:3,reward:{gold:14,xp:45},
     special:{name:"Hex",chance:.3,msg:"casts Hex on you!",dmgMult:1.5}},
  ],
  cave:[
    {name:"Giant Bat",hp:8,maxHp:8,atk:3,minLvl:1,reward:{gold:4,xp:12}},
    {name:"Stone Golem",hp:22,maxHp:22,atk:8,minLvl:1,reward:{gold:12,xp:40}},
    {name:"Cave Troll",hp:35,maxHp:35,atk:11,minLvl:3,reward:{gold:18,xp:55},
     special:{name:"Smash",chance:.25,msg:"slams the ground — shockwave hits you!",dmgMult:2}},
    {name:"Shadow Wraith",hp:28,maxHp:28,atk:14,minLvl:4,reward:{gold:22,xp:65},
     special:{name:"Drain",chance:.35,msg:"drains your life force!",dmgMult:1.3,lifeSteal:true}},
  ],
  ruins:[
    {name:"Skeleton Knight",hp:30,maxHp:30,atk:10,minLvl:4,reward:{gold:20,xp:60}},
    {name:"Cursed Mage",hp:24,maxHp:24,atk:16,minLvl:4,reward:{gold:25,xp:70},
     special:{name:"Arcane Burst",chance:.4,msg:"unleashes arcane burst!",dmgMult:1.8}},
    {name:"Lich",hp:45,maxHp:45,atk:14,minLvl:5,reward:{gold:35,xp:90},
     special:{name:"Reanimate",chance:.2,msg:"reanimates — regains 10 HP!",heal:10}},
    {isBoss:true,name:"BOSS: The Dread Knight",hp:80,maxHp:80,atk:18,minLvl:5,reward:{gold:80,xp:200},
     special:{name:"Death Cleave",chance:.4,msg:"swings Death Cleave — massive blow!",dmgMult:2.2}},
    {isBoss:true,name:"BOSS: Archlich Mortavian",hp:100,maxHp:100,atk:22,minLvl:6,reward:{gold:120,xp:300},
     special:{name:"Soul Shatter",chance:.5,msg:"shatters your soul!",dmgMult:2,lifeSteal:true}},
  ]
};

const SHOP=[
  {name:"Health Potion",cost:8,fn(){const h=Math.min(S.maxHp,S.hp+15)-S.hp;S.hp+=h;S.inventory.push("potion");return"+"+h+" HP (potion added)"}},
  {name:"Iron Sword (+2 ATK)",cost:15,fn(){S.atk+=2;return"ATK +2"}},
  {name:"Tower Shield (+2 DEF)",cost:12,fn(){S.def+=2;return"DEF +2"}},
  {name:"Max Elixir (full HP)",cost:25,fn(){const h=S.maxHp-S.hp;S.hp=S.maxHp;return"+"+h+" HP"}},
];

function rnd(n){return Math.floor(Math.random()*n)}
const log=document.getElementById("log");
function print(msg,cls=""){const p=document.createElement("p");p.className="log-line";p.innerHTML=cls?`<span class="${cls}">${msg}</span>`:msg;log.appendChild(p);log.scrollTop=log.scrollHeight;}
function sep(){print("")}

function updateStats(){
  document.getElementById("s-hp").textContent=S.hp+"/"+S.maxHp;
  document.getElementById("s-atk").textContent=S.atk;
  document.getElementById("s-def").textContent=S.def;
  document.getElementById("s-gold").textContent=S.gold+"g";
  document.getElementById("s-level").textContent=S.level;
  const pct=Math.max(0,S.hp/S.maxHp*100);
  const hb=document.getElementById("hp-bar");
  hb.style.width=pct+"%";
  hb.style.background=pct>50?"#3B6D11":pct>25?"#BA7517":"#A32D2D";
  const needed=XP_PER_LEVEL(S.level);
  document.getElementById("xp-bar").style.width=Math.min(100,S.xp/needed*100)+"%";
  document.getElementById("xp-text").textContent=S.xp+"/"+needed;
  document.getElementById("location-tag").textContent=LOCATIONS[S.location].name;
}

function updateEnemyBlock(){
  const eb=document.getElementById("enemy-block");
  if(!S.enemy){eb.style.display="none";return;}
  eb.style.display="block";
  eb.className=S.enemy.isBoss?"boss-block":"";
  document.getElementById("enemy-name").textContent=S.enemy.name+(S.enemy.stunned?" [STUNNED]":"");
  const pct=Math.max(0,S.enemy.hp/S.enemy.maxHp*100);
  document.getElementById("enemy-bar").style.width=pct+"%";
  document.getElementById("enemy-hp-text").textContent="HP: "+Math.max(0,S.enemy.hp)+"/"+S.enemy.maxHp;
}

function mkBtn(label,fn,cls,full){
  const b=document.createElement("button");
  if(cls)b.className=cls;
  if(full)b.style.gridColumn="1 / -1";
  b.innerHTML=label;
  b.onclick=fn;
  return b;
}

function getUnlockedAbilities(){return ABILITIES.filter(a=>S.level>=a.unlockLvl);}

function renderAbilities(){
  const row=document.getElementById("abilities-row");
  row.innerHTML="";
  const avail=getUnlockedAbilities();
  if(!avail.length){row.style.display="none";return;}
  row.style.display="grid";
  avail.forEach(ab=>{
    const cd=S.abilityCDs[ab.id]||0;
    const ready=cd===0;
    const b=mkBtn(ab.name+(cd>0?` <span class="cd-badge">[${cd}]</span>`:""),()=>useAbility(ab),"btn-ability");
    b.title=ab.desc+" | CD: "+ab.cd+" turns"+(cd>0?" | Ready in "+cd:"");
    if(!ready||!S.enemy)b.disabled=true;
    row.appendChild(b);
  });
}

function useAbility(ab){
  if(!S.enemy)return;
  S.abilityCDs[ab.id]=ab.cd;
  ab.use(S.enemy);
  updateEnemyBlock();
  updateStats();
  if(S.enemy&&S.enemy.hp<=0){enemyDied();return;}
  if(S.enemy)enemyAttacks();
  tickCDs();
  renderCombat();
}

function tickCDs(){
  Object.keys(S.abilityCDs).forEach(k=>{if(S.abilityCDs[k]>0)S.abilityCDs[k]--;});
}

function renderExplore(){
  S.phase="explore";
  document.getElementById("abilities-row").style.display="none";
  const act=document.getElementById("actions");
  act.innerHTML="";
  const loc=LOCATIONS[S.location];
  Object.entries(loc.exits).forEach(([dest,label])=>{
    act.appendChild(mkBtn("→ "+label,()=>travel(dest)));
  });
  const pool=(ENEMIES[S.location]||[]).filter(e=>S.level>=e.minLvl);
  if(pool.length){
    const hasBoss=pool.some(e=>e.isBoss&&S.level>=e.minLvl);
    act.appendChild(mkBtn("⚔ Search for enemies",()=>encounter(false)));
    if(hasBoss)act.appendChild(mkBtn("☠ Challenge a Boss",()=>encounter(true),"btn-boss"));
  }
  if(S.location==="town"){
    act.appendChild(mkBtn("🛒 Visit merchant",()=>renderShop()));
    if(S.hp<S.maxHp)act.appendChild(mkBtn("🛏 Rest (free, full HP)",()=>{S.hp=S.maxHp;print("Fully rested!","ok");updateStats();renderExplore();}));
  }
}

function travel(dest){
  S.location=dest;
  const loc=LOCATIONS[dest];
  sep();print("— "+loc.name+" —","em");print(loc.desc,"muted");
  updateStats();renderExplore();
}

function encounter(bossOnly){
  let pool=(ENEMIES[S.location]||[]).filter(e=>S.level>=e.minLvl);
  if(bossOnly)pool=pool.filter(e=>e.isBoss);
  else pool=pool.filter(e=>!e.isBoss);
  if(!pool.length){print("No suitable enemies here right now.","muted");return;}
  const tmpl=pool[rnd(pool.length)];
  S.enemy={...tmpl,hp:tmpl.hp,maxHp:tmpl.maxHp};
  sep();
  if(S.enemy.isBoss){print("★ BOSS ENCOUNTER: "+S.enemy.name+" ★","boss-line");}
  else{print("A "+S.enemy.name+" appears! HP: "+S.enemy.hp,"dmg");}
  updateEnemyBlock();
  renderCombat();
}

function renderCombat(){
  S.phase="combat";
  renderAbilities();
  const act=document.getElementById("actions");
  act.innerHTML="";
  act.appendChild(mkBtn("⚔ Attack",()=>doAttack()));
  act.appendChild(mkBtn("🏃 Flee",()=>flee()));
  const pots=S.inventory.filter(i=>i==="potion").length;
  if(pots>0)act.appendChild(mkBtn("🧪 Use Potion ("+pots+")",()=>usePotion()));
}

function doAttack(){
  if(!S.enemy)return;
  const d=Math.max(1,S.atk+rnd(4)-1);
  S.enemy.hp-=d;
  print("You attack "+S.enemy.name+" for "+d+" damage.","ok");
  updateEnemyBlock();
  if(S.enemy.hp<=0){enemyDied();return;}
  enemyAttacks();
  tickCDs();
  renderCombat();
  updateStats();
}

function enemyAttacks(){
  if(!S.enemy)return;
  if(S.enemy.stunned){print(S.enemy.name+" is stunned and skips a turn!","muted");S.enemy.stunned=false;return;}
  let dmg=Math.max(0,S.enemy.atk-S.def+rnd(3)-1);
  let msg=S.enemy.name+" hits you for "+dmg+".";
  if(S.enemy.special&&Math.random()<S.enemy.special.chance){
    const sp=S.enemy.special;
    if(sp.heal){S.enemy.hp=Math.min(S.enemy.maxHp,S.enemy.hp+sp.heal);msg=S.enemy.name+" "+sp.msg;dmg=0;}
    else{dmg=Math.round(dmg*(sp.dmgMult||1));msg=S.enemy.name+" "+sp.msg+" "+dmg+" damage!";}
    if(sp.lifeSteal){S.enemy.hp=Math.min(S.enemy.maxHp,S.enemy.hp+Math.round(dmg*0.3));msg+=" (life steal)";}
    print(msg,"boss-line");
  }else{print(msg,"dmg");}
  S.hp-=dmg;
  updateEnemyBlock();
  if(S.hp<=0){S.hp=0;updateStats();renderDead();}
}

function enemyDied(){
  const r=S.enemy.reward;
  S.gold+=r.gold;S.xp+=r.xp;
  print("Defeated! +"+r.gold+"g +"+r.xp+" XP","em");
  if(S.enemy.isBoss)print("★ Boss slain! The realm is safer.","boss-line");
  S.enemy=null;
  document.getElementById("enemy-block").style.display="none";
  document.getElementById("abilities-row").style.display="none";
  checkLevelUp();
  updateStats();
  renderExplore();
}

function checkLevelUp(){
  const needed=XP_PER_LEVEL(S.level);
  if(S.xp>=needed){
    S.xp-=needed;S.level++;
    S.maxHp+=8;S.hp=Math.min(S.maxHp,S.hp+8);S.atk+=1;
    const newAb=ABILITIES.find(a=>a.unlockLvl===S.level);
    print("✨ Level "+S.level+"! Max HP +8, ATK +1"+(newAb?" | New ability: "+newAb.name:""),"em");
  }
}

function flee(){
  if(Math.random()>0.4){print("You escaped!","muted");S.enemy=null;document.getElementById("enemy-block").style.display="none";document.getElementById("abilities-row").style.display="none";renderExplore();}
  else{const d=Math.max(0,S.enemy.atk-S.def);S.hp-=d;print("Failed to flee! Hit for "+d+".","dmg");updateStats();if(S.hp<=0){renderDead();return;}renderCombat();}
}

function usePotion(){
  const idx=S.inventory.indexOf("potion");if(idx<0)return;
  S.inventory.splice(idx,1);
  const h=Math.min(S.maxHp-S.hp,15);S.hp+=h;
  print("Potion: +"+h+" HP","ok");updateStats();
  if(S.phase==="combat")renderCombat();
}

function renderShop(){
  document.getElementById("abilities-row").style.display="none";
  const act=document.getElementById("actions");act.innerHTML="";
  SHOP.forEach(item=>{
    const b=mkBtn(item.name+" ("+item.cost+"g)",()=>{
      if(S.gold<item.cost){print("Not enough gold.","dmg");return;}
      S.gold-=item.cost;const res=item.fn();
      print("Bought "+item.name+". "+res,"ok");updateStats();renderShop();
    });
    if(S.gold<item.cost)b.disabled=true;
    act.appendChild(b);
  });
  act.appendChild(mkBtn("← Leave shop",()=>renderExplore(),null,true));
}

function renderDead(){
  document.getElementById("abilities-row").style.display="none";
  document.getElementById("enemy-block").style.display="none";
  const act=document.getElementById("actions");act.innerHTML="";
  print("You have fallen...","dmg");
  act.appendChild(mkBtn("↩ Start over",()=>{
    Object.assign(S,{hp:30,maxHp:30,atk:6,def:2,gold:10,xp:0,level:1,inventory:[],location:"crossroads",enemy:null,phase:"explore",abilityCDs:{}});
    log.innerHTML="";print("A new hero rises...","muted");travel("crossroads");
  },null,true));
}

print("Welcome, brave soul.","em");
print("Abilities unlock as you level up. Bosses await in the Ancient Ruins.","muted");
travel("crossroads");
</script>
